name: "logger_flutter_client"
description: "LoggerFlutterClient - приложение для просмотра логов"
publish_to: "none"
version: "1.0.0+1"
environment:
  sdk: ">=3.0.0 <4.0.0"
dependencies:
  flutter:
    sdk: "flutter"
  flutter_launcher_icons: ^0.13.1
  path_provider: ^2.1.5
  shared_preferences: ^2.2.2
  cupertino_icons: "^1.0.6"
  google_fonts: "^6.1.0"
  font_awesome_flutter: "^10.6.0"
  animations: "^2.0.8"
  provider: "^6.1.1"
  http: "^1.1.0"
  socket_io_client: "^2.0.3+1"
  intl: "^0.18.1"
  url_launcher: "^6.2.1"
  clipboard: "^0.1.3"
  json_annotation: "^4.8.1"
  flutter_highlight: "^0.7.0"
  highlight: "^0.7.0"
  window_manager: "^0.3.7"
  flutter_dotenv: "^5.1.0"
dev_dependencies:
  flutter_test:
    sdk: "flutter"
  flutter_lints: "^3.0.1"
  build_runner: "^2.4.8"
  json_serializable: "^6.7.1"
  inno_build: "^0.4.0"
flutter:
  uses-material-design: true
  assets:
    - assets/certificates/isrgrootx1.pem
    - .env
inno_build:
  app_id: "fcb937c1-304a-4b78-9d75-61c479733ee6"
flutter_launcher_icons:
  windows:
    generate: true
    image_path: "assets/images/icon.ico"
    icon_size: 256
  macos:
    generate: false
  ios: false
  android: false
